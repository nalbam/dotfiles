# BEGIN dotfiles managed codex config
# Codex 전역 설정. ~/.codex/config.toml 로 동기화된다.
# 런타임 상태(hooks.state / projects trust / tui 등)는 Codex가 자동으로 덧쓴다.
# model은 의도적으로 고정하지 않는다 — 런타임 선택을 sync가 덮어쓰지 않도록 둔다.

# 승인 정책: 필요 시에만 사용자에게 승인을 요청한다.
approval_policy = "on-request"

# 샌드박스: 워크스페이스 내 쓰기 허용, 그 외는 승인 필요.
sandbox_mode = "workspace-write"

[features]
hooks = true

[sandbox_workspace_write]
network_access = true
# END dotfiles managed codex config
